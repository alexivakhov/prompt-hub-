<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800">
  <title>Neumorphic Prompt Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== MAIN 3-COLUMN LAYOUT ===== -->
  <div class="app-container">

    <!-- ── LEFT SIDEBAR: Navigation ── -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <!-- Simple brain/hub icon -->
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a4 4 0 0 1 4 4c0 1.1-.9 2-2 2h-4c-1.1 0-2-.9-2-2a4 4 0 0 1 4-4z"/>
          <path d="M8 8v1a4 4 0 0 0 8 0V8"/>
          <path d="M12 13v9"/>
          <path d="M8 18h8"/>
          <path d="M7 15h10"/>
        </svg>
        <span class="logo-text">Prompt Hub</span>
      </div>

      <nav class="sidebar-nav">
        <!-- All Prompts -->
        <button class="nav-btn active" data-view="all" title="All Prompts">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span>All Prompts</span>
        </button>

        <!-- Favorites -->
        <button class="nav-btn" data-view="favorites" title="Favorites">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <span>Favorites</span>
        </button>

        <!-- Categories -->
        <button class="nav-btn" data-view="categories" title="Categories">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>Categories</span>
        </button>

        <!-- Trash -->
        <button class="nav-btn" data-view="trash" title="Trash">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          <span>Trash</span>
        </button>
      </nav>

      <!-- New Prompt Button at bottom of sidebar -->
      <button class="new-prompt-btn" id="btnNewPrompt" title="Create new prompt">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span>New Prompt</span>
      </button>

      <!-- Data Management: Export / Import -->
      <div class="data-actions">
        <button class="data-btn" id="btnExport" title="Export prompts as JSON">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>Export</span>
        </button>
        <button class="data-btn" id="btnImport" title="Import prompts from JSON">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span>Import</span>
        </button>
      </div>

      <!-- Hidden file input for JSON import -->
      <input type="file" id="importFile" accept=".json" class="hidden">
    </aside>

    <!-- ── CENTER PANEL: Prompt List ── -->
    <section class="list-panel">
      <!-- Search bar -->
      <div class="search-wrapper">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search prompts...">
      </div>

      <!-- View title (shows current filter context) -->
      <div class="list-header">
        <span id="listTitle">All Prompts</span>
        <span id="listCount" class="list-count">0</span>
      </div>

      <!-- Category sub-list (visible only in Categories view) -->
      <div id="categoryList" class="category-list hidden">
        <!-- Populated dynamically -->
      </div>

      <!-- Scrollable prompt list -->
      <ul id="promptList" class="prompt-list">
        <!-- Populated dynamically -->
      </ul>
    </section>

    <!-- ── RIGHT PANEL: Editor / Viewer ── -->
    <section class="editor-panel">
      <!-- Empty state (shown when no prompt selected) -->
      <div id="emptyState" class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <p>Select a prompt or create a new one</p>
      </div>

      <!-- Editor form (hidden until a prompt is selected) -->
      <div id="editorForm" class="editor-form hidden">
        <!-- Favorite toggle + Title -->
        <div class="editor-top-row">
          <button id="btnFavorite" class="fav-btn" title="Toggle favorite">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </button>
          <input type="text" id="promptTitle" class="editor-title" placeholder="Prompt title...">
        </div>

        <!-- Category selector -->
        <div class="editor-category-row">
          <label for="promptCategory">Category</label>
          <select id="promptCategory" class="category-select">
            <!-- Populated dynamically -->
          </select>
          <button id="btnAddCategory" class="icon-btn" title="Add new category">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>

        <!-- Prompt body textarea -->
        <textarea id="promptBody" class="editor-body" placeholder="Write your prompt here..."></textarea>

        <!-- Action buttons -->
        <div class="editor-actions">
          <button id="btnCopy" class="action-btn primary-btn" title="Copy to clipboard">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span id="copyLabel">Copy</span>
          </button>
          <div class="action-right-group">
            <button id="btnSave" class="action-btn save-btn" title="Save prompt">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                <polyline points="17 21 17 13 7 13 7 21"/>
                <polyline points="7 3 7 8 15 8"/>
              </svg>
              <span>Save</span>
            </button>
            <button id="btnDelete" class="action-btn delete-btn" title="Move to Trash">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/>
                <path d="M14 11v6"/>
              </svg>
              <span>Delete</span>
            </button>
          </div>
        </div>

        <!-- Trash-specific actions (restore / permanent delete) -->
        <div id="trashActions" class="editor-actions trash-actions hidden">
          <button id="btnRestore" class="action-btn save-btn" title="Restore from Trash">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
            <span>Restore</span>
          </button>
          <button id="btnPermanentDelete" class="action-btn delete-btn" title="Delete permanently">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            <span>Delete Forever</span>
          </button>
        </div>
      </div>
    </section>

  </div>

  <!-- New Category Modal -->
  <div id="categoryModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>New Category</h3>
      <input type="text" id="newCategoryInput" class="modal-input" placeholder="Category name..." maxlength="40">
      <div class="modal-actions">
        <button id="btnCancelCategory" class="action-btn">Cancel</button>
        <button id="btnConfirmCategory" class="action-btn save-btn">Create</button>
      </div>
    </div>
  </div>

  <!-- Variables Modal -->
  <div id="variableModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>Fill Variables</h3>
      <div id="varInputs" class="modal-body-scroll">
        <!-- Populated dynamically -->
      </div>
      <div class="modal-actions">
        <button id="btnCancelVar" class="action-btn">Cancel</button>
        <button id="btnConfirmVar" class="action-btn save-btn">Copy Processed</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
