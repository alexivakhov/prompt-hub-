<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=900">
  <title>Prompt Hub</title>
  <link rel="stylesheet" href="style.css?v=8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- ── UNIFIED RAIL: icon nav + list ── -->
    <div class="rail">
      <!-- Icon nav column -->
      <nav class="icon-nav">
        <div class="logo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h10"/><path d="M4 12h16"/><path d="M4 18h7"/><circle cx="18" cy="6" r="2" fill="#fff"/>
          </svg>
        </div>

        <button class="icon-btn active" data-view="all" title="All Prompts">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          </svg>
        </button>
        <button class="icon-btn" data-view="favorites" title="Favorites">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77 5.82 21.02 7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
        </button>
        <button class="icon-btn" data-view="categories" title="Categories">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </button>
        <button class="icon-btn" data-view="trash" title="Trash">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          </svg>
        </button>

        <div class="flex1"></div>

        <button class="icon-btn" id="btnImport" title="Import">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </button>
        <button class="icon-btn" id="btnExport" title="Export">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </button>
        <button class="icon-btn" id="btnTheme" title="Toggle theme">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <input type="file" id="importFile" accept=".json" class="hidden">
      </nav>

      <!-- List panel -->
      <section class="list-panel">
        <div class="list-header">
          <div class="list-title-row">
            <h2 id="listTitle">All prompts</h2>
            <span class="chip" id="listCount">0</span>
          </div>
          <div class="search">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Search prompts…">
          </div>
        </div>

        <div id="categoryList" class="category-list hidden"></div>

        <ul id="promptList" class="prompt-list"></ul>

        <div class="list-footer">
          <button class="btn-new-big" id="btnListNew" title="New prompt (⌘N)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            New prompt
          </button>
        </div>
      </section>
    </div>

    <!-- ── EDITOR CANVAS ── -->
    <section class="editor">
      <div id="emptyState" class="empty-state">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <p>Select a prompt or create a new one</p>
      </div>

      <div id="editorForm" class="editor-form hidden">
        <!-- Toolbar -->
        <div class="toolbar">
          <div class="cat-pill" id="catPill">
            <span class="dot" id="catDot"></span>
            <span id="catLabel">Dev</span>
          </div>
          <div class="meta" id="metaInfo">· Updated just now</div>
          <div class="flex1"></div>
          <button class="tool-btn" id="btnFavorite" title="Favorite">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77 5.82 21.02 7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </svg>
          </button>
          <button class="tool-btn" id="btnChangeCat" title="Change category">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
        </div>

        <!-- Title -->
        <input type="text" id="promptTitle" class="title-input" placeholder="Untitled prompt">

        <!-- Body card -->
        <div class="body-card">
          <textarea id="promptBody" placeholder="Write your prompt here… Use {{variable}} for placeholders."></textarea>
          <div class="body-meta" id="bodyMeta">0 chars</div>
        </div>

        <!-- Action row — Copy is primary wide, Save + Delete ghosts -->
        <div class="actions">
          <button class="btn btn-primary" id="btnCopy">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span id="copyLabel">Copy prompt</span>
          </button>
          <button class="btn btn-ghost" id="btnSave" title="Save">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
          </button>
          <button class="btn btn-ghost btn-danger" id="btnDelete" title="Move to Trash">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            </svg>
          </button>
        </div>

        <!-- Trash-only actions -->
        <div id="trashActions" class="actions hidden">
          <button class="btn btn-secondary" id="btnRestore">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10"/>
              <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
            </svg>
            Restore
          </button>
          <button class="btn btn-primary btn-danger-solid" id="btnPermanentDelete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
            Delete forever
          </button>
        </div>
      </div>
    </section>
  </div>

  <!-- Category menu (shown from toolbar) -->
  <div id="catMenu" class="cat-menu hidden"></div>

  <!-- New Category Modal -->
  <div id="categoryModal" class="modal-overlay hidden">
    <div class="modal-card">
      <h3>New category</h3>
      <input type="text" id="newCategoryInput" placeholder="Category name…" maxlength="40">
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btnCancelCategory">Cancel</button>
        <button class="btn btn-primary" id="btnConfirmCategory">Create</button>
      </div>
    </div>
  </div>

  <!-- Variables Modal -->
  <div id="variableModal" class="modal-overlay hidden">
    <div class="modal-card modal-wide">
      <h3>Fill in variables</h3>
      <div class="modal-sub">Values will replace <code>{{ }}</code> placeholders before copying.</div>
      <div id="varInputs" class="var-inputs"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="btnCancelVar">Cancel</button>
        <button class="btn btn-primary" id="btnConfirmVar">Copy filled prompt</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
